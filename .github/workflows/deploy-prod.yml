name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore TaskIA.sln

      - name: Generate appsettings.Production.json
        shell: pwsh
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          $config = @{
            Logging = @{
              LogLevel = @{
                Default = "Warning"
                "Microsoft.AspNetCore" = "Warning"
                "Microsoft.EntityFrameworkCore" = "Error"
              }
            }
            ConnectionStrings = @{
              DefaultConnection = $env:DB_CONNECTION_STRING
            }
            JwtSettings = @{
              Secret = $env:JWT_SECRET
              Issuer = "TaskIA-API"
              Audience = "TaskIA-Client"
              ExpirationInMinutes = 15
              RefreshTokenExpirationInDays = 7
            }
            Claude = @{
              ApiKey = $env:CLAUDE_API_KEY
              Model = "claude-sonnet-4-5"
              BaseUrl = "https://api.anthropic.com/v1"
            }
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content -Path "Application/appsettings.Production.json" -Encoding UTF8

      - name: Build
        run: dotnet build TaskIA.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Application/API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy via Web Deploy (MSDeploy)
        shell: pwsh
        env:
          MSDEPLOY_PASSWORD: ${{ secrets.MSDEPLOY_PASSWORD }}
        run: |
          $paths = @(
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe",
            "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          )
          $msdeployPath = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $msdeployPath) { throw "msdeploy.exe not found. Install Web Deploy on the runner." }

          $sourcePath = "${{ github.workspace }}\publish"
          $dest = "contentPath='brotherdigital-001-site2'," +
                  "computerName='https://win8103.site4now.net:8172/msdeploy.axd?site=brotherdigital-001-site2'," +
                  "userName='brotherdigital-001'," +
                  "password='$env:MSDEPLOY_PASSWORD'," +
                  "authType='Basic'"

          & $msdeployPath `
            -verb:sync `
            "-source:contentPath=$sourcePath" `
            "-dest:$dest" `
            -allowUntrusted `
            -enableRule:AppOffline

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
